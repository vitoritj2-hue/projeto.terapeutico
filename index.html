<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#222d42;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0f4ff;--text2:#8b9abd;--text3:#5a6a8a;
  --blue:#4f8ef7;--teal:#2dd4aa;
  --grad:linear-gradient(135deg,#4f8ef7,#2dd4aa);
  --green:#2dd4aa;--yellow:#f0b429;--red:#f56565;--obs:#718096;
  --shadow:0 4px 24px rgba(0,0,0,.4);--r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:'Inter',sans-serif}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* HOME */
#screen-home{background:var(--bg);align-items:center;justify-content:center;position:relative;overflow:hidden}
.home-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 800px 500px at 20% 50%,rgba(79,142,247,.08) 0%,transparent 70%),radial-gradient(ellipse 600px 400px at 80% 30%,rgba(45,212,170,.06) 0%,transparent 70%)}
.home-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px}
.home-inner{z-index:1;text-align:center;padding:40px 24px;max-width:520px;width:100%;animation:fadeUp .7s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.home-logo-wrap{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,#1e3a5f,#1a4a3a);border:1px solid rgba(79,142,247,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 40px rgba(79,142,247,.15)}
.home-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--teal);margin-bottom:12px}
.home-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:6px;background:linear-gradient(135deg,#fff 40%,#8ba8d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:.9rem;color:var(--text2);margin-bottom:44px;font-weight:300}
.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.home-card{background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:22px 18px;cursor:pointer;transition:all .3s;text-align:left}
.home-card:hover{border-color:rgba(79,142,247,.4);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.home-card-line{width:24px;height:2px;border-radius:2px;background:var(--grad);margin-bottom:12px}
.home-card-label{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:3px}
.home-card-sub{font-size:.75rem;color:var(--text2)}
.home-access{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.84rem;font-weight:500;transition:all .25s}
.btn-outline:hover{border-color:var(--blue);color:var(--text);background:rgba(79,142,247,.06)}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;height:56px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-brand{font-weight:700;font-size:.9rem;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:8px;margin-right:8px}
.topbar-brand-dot{width:22px;height:22px;border-radius:6px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:700;flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-user{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text2)}
.topbar-avatar{width:26px;height:26px;border-radius:7px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:white;font-size:.65rem;font-weight:700;flex-shrink:0}
.topbar-logout{background:none;border:1px solid var(--border2);color:var(--text3);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:.76rem;transition:all .2s}
.topbar-logout:hover{color:var(--red);border-color:rgba(245,101,101,.3)}
.notif-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;flex-shrink:0;transition:all .2s}
.notif-btn:hover{border-color:var(--border2);color:var(--text)}
.notif-dot{position:absolute;top:-3px;right:-3px;background:var(--red);color:white;font-size:.52rem;font-weight:700;border-radius:50%;width:14px;height:14px;display:none;align-items:center;justify-content:center;border:2px solid var(--bg2)}

/* ABAS */
.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:0 18px;height:44px;display:flex;align-items:center;font-size:.8rem;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;flex-shrink:0}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}

/* CONTEÚDO */
.page-content{flex:1;overflow-y:auto}
.page{display:none;padding:24px 20px;max-width:1100px;margin:0 auto;width:100%}
.page.active{display:block}
.page-header{margin-bottom:22px}
.page-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--text)}
.page-subtitle{font-size:.78rem;color:var(--text2);margin-top:3px}

/* TRIAGEM */
#screen-triagem{background:var(--bg)}
.triagem-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.triagem-header h2{font-size:1rem;font-weight:600}
.tipo-pill{margin-left:auto;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);color:var(--blue);border-radius:50px;padding:3px 12px;font-size:.72rem;font-weight:600}
.back-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.back-btn:hover{background:var(--bg4);color:var(--text)}
.triagem-body{max-width:680px;margin:0 auto;padding:28px 20px;width:100%}
.fst{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.one{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.72rem;font-weight:500;color:var(--text2)}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg select option{background:var(--bg3)}
.fg textarea{resize:vertical;min-height:80px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.checkbox-item{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--text2);cursor:pointer}
.checkbox-item input{accent-color:var(--teal)}
.submit-btn{width:100%;margin-top:24px;background:var(--grad);color:white;border:none;padding:13px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .3s}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}

/* MÉTRICAS */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .2s}
.metric-card:hover{border-color:var(--border2)}
.metric-label{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.metric-value{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--text)}
.metric-accent{width:24px;height:2px;background:var(--grad);border-radius:2px;margin-top:6px}

/* DATA CARD */
.data-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.data-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.data-card-title{font-size:.86rem;font-weight:600;color:var(--text)}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:9px 14px;text-align:left;font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:12px 14px;font-size:.83rem;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle}
td strong{color:var(--text);font-weight:600}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.empty-row td{text-align:center;color:var(--text3);font-style:italic;padding:28px}

/* BUSCA */
.search-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:14px}
.search-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-input-wrap{flex:1;min-width:180px;position:relative}
.search-input-wrap input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 12px 8px 34px;font-family:'Inter',sans-serif;font-size:.83rem;outline:none;transition:border-color .2s;width:100%}
.search-input-wrap input::placeholder{color:var(--text3)}
.search-input-wrap input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3)}
.search-filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
.filter-label{font-size:.7rem;font-weight:600;color:var(--text3);white-space:nowrap}
.filter-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:5px 9px;font-family:'Inter',sans-serif;font-size:.76rem;outline:none;cursor:pointer}
.filter-select option{background:var(--bg3)}
.filter-chip{padding:4px 11px;border-radius:50px;font-size:.72rem;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .2s;white-space:nowrap}
.filter-chip:hover{border-color:var(--blue);color:var(--blue)}
.filter-chip.active-all{background:rgba(79,142,247,.1);color:var(--blue);border-color:rgba(79,142,247,.3)}
.filter-chip.active-andamento{background:rgba(240,180,41,.1);color:var(--yellow);border-color:rgba(240,180,41,.3)}
.filter-chip.active-finalizado{background:rgba(45,212,170,.1);color:var(--teal);border-color:rgba(45,212,170,.3)}
.filter-chip.active-imprevisto{background:rgba(245,101,101,.1);color:var(--red);border-color:rgba(245,101,101,.3)}
.filter-chip.active-obs{background:rgba(113,128,150,.1);color:var(--obs);border-color:rgba(113,128,150,.3)}
.search-info{font-size:.72rem;color:var(--text3);margin-top:8px;display:flex;justify-content:space-between}
.clear-btn{background:none;border:none;color:var(--blue);font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif}
.highlight{background:rgba(79,142,247,.2);border-radius:3px;padding:1px 2px;color:var(--text)}

/* BADGES */
.sb{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:50px;font-size:.7rem;font-weight:500}
.sb-green{background:rgba(45,212,170,.1);color:var(--teal)}
.sb-yellow{background:rgba(240,180,41,.1);color:var(--yellow)}
.sb-red{background:rgba(245,101,101,.1);color:var(--red)}
.sb-obs{background:rgba(113,128,150,.1);color:var(--obs)}
.sd{width:5px;height:5px;border-radius:50%}
.sd-g{background:var(--green)}.sd-y{background:var(--yellow)}.sd-r{background:var(--red)}.sd-o{background:var(--obs)}
.lv{display:inline-flex;padding:2px 8px;border-radius:50px;font-size:.66rem;font-weight:700;color:white}
.lv1{background:linear-gradient(135deg,#4f8ef7,#7bb3ff)}
.lv2{background:linear-gradient(135deg,#1e3a5f,#4f8ef7)}
.lv3{background:var(--grad)}

/* TERAPEUTAS */
.therapist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.therapist-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.tc-header{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.t-avatar{width:40px;height:40px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.86rem;flex-shrink:0}
.t-info h4{font-size:.88rem;font-weight:600;color:var(--text)}
.t-info p{font-size:.72rem;color:var(--text2);margin-top:2px}
.tc-credentials{background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid var(--border)}
.cred-row{display:flex;align-items:center;gap:8px;font-size:.76rem;padding:3px 0}
.cred-label{color:var(--text3);min-width:52px;font-weight:500}
.cred-val{color:var(--text);font-weight:500;flex:1}
.cred-edit{background:none;border:none;color:var(--blue);cursor:pointer;font-size:.7rem;font-family:'Inter',sans-serif}
.tc-footer{display:flex;gap:8px;align-items:center}
.tc-badge{font-size:.68rem;padding:2px 9px;border-radius:50px;background:rgba(45,212,170,.1);color:var(--teal);font-weight:500;border:1px solid rgba(45,212,170,.2)}
.add-card{background:var(--bg3);border:2px dashed var(--border2);border-radius:var(--r);padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .2s;color:var(--text3);min-height:120px;text-align:center}
.add-card:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,.03)}
.add-card-icon{font-size:1.8rem;line-height:1}

/* PATIENT CARDS */
.patients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.patient-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .25s}
.patient-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.pch{padding:14px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border)}
.p-avatar{width:38px;height:38px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:.86rem;flex-shrink:0}
.p-info h4{font-size:.88rem;font-weight:600;color:var(--text)}
.p-info p{font-size:.7rem;color:var(--text2);margin-top:2px}
.p-ind{margin-left:auto;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pcb{padding:12px 16px}
.sess-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.75rem}
.sess-lbl{color:var(--text3)}.sess-cnt{font-weight:600;color:var(--text)}
.pbar{height:3px;background:var(--bg4);border-radius:50px;overflow:hidden;margin-bottom:12px}
.pfill{height:100%;border-radius:50px;background:var(--grad);transition:width .4s}
.sess-controls{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.sess-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;transition:all .2s;background:var(--bg3);color:var(--text2)}
.sess-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.sess-btn:disabled{opacity:.25;cursor:not-allowed}
.sess-dots{display:flex;gap:4px;flex:1;justify-content:center}
.sess-dot{width:11px;height:11px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);transition:all .25s}
.sess-dot.done{background:var(--grad);border-color:transparent}
.sess-dot.current{background:var(--grad);border:2px solid var(--teal);box-shadow:0 0 8px rgba(45,212,170,.3)}
.dev-lbl{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.dev-link{background:none;border:none;color:var(--blue);font-size:.7rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.dev-txt{font-size:.8rem;line-height:1.5;min-height:52px;background:var(--bg3);border-radius:8px;padding:8px 10px;border:1px solid var(--border);font-family:'Inter',sans-serif;width:100%;resize:none;outline:none;color:var(--text);transition:border-color .2s}
.dev-txt:focus{border-color:var(--blue)}
.dev-txt::placeholder{color:var(--text3)}
.pcf{padding:9px 16px;border-top:1px solid var(--border);display:flex;gap:6px}
.sbt{flex:1;padding:6px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:.68rem;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;transition:all .2s;color:var(--text2)}
.sbt:hover{border-color:var(--border2)}
.sbt.ag{border-color:rgba(45,212,170,.3);color:var(--teal);background:rgba(45,212,170,.06)}
.sbt.ay{border-color:rgba(240,180,41,.3);color:var(--yellow);background:rgba(240,180,41,.06)}
.sbt.ar{border-color:rgba(245,101,101,.3);color:var(--red);background:rgba(245,101,101,.06)}
.sbt.ao{border-color:rgba(113,128,150,.3);color:var(--obs);background:rgba(113,128,150,.06)}

/* CALENDÁRIO */
.cal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.cal-nav-title{font-weight:600;font-size:.95rem;color:var(--text)}
.cal-arrow{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-arrow:hover{border-color:var(--border2);color:var(--text)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg3);border-bottom:1px solid var(--border)}
.cal-wd{text-align:center;padding:7px 4px;font-size:.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:64px;padding:5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;user-select:none}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:rgba(79,142,247,.06)}
.cal-day.other-month .day-num{color:var(--bg4)}
.cal-day.other-month{cursor:default}
.cal-day.today .day-num{background:var(--grad);color:white;border-radius:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-day.selected{background:rgba(79,142,247,.1);outline:2px solid rgba(79,142,247,.4);outline-offset:-1px}
.day-num{font-size:.76rem;font-weight:600;color:var(--text2);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.day-events{display:flex;flex-direction:column;gap:2px}
.day-event-pill{font-size:.58rem;padding:2px 4px;border-radius:3px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
